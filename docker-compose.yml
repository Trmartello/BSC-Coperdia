version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bsc_coperdia
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./apps/api
    restart: unless-stopped
    env_file: .env
    ports:
      - '3001:3001'
    depends_on:
      - postgres

  web:
    build: ./apps/web
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres_data:
